name: Accessibility issue
description: Report a barrier in docs, dashboards, PDFs, or generated outputs.
title: "[Accessibility]: "
labels: ["accessibility"]
body:
  - type: textarea
    id: barrier
    attributes:
      label: Accessibility barrier
      description: What was difficult or impossible to use?
    validations:
      required: true
  - type: textarea
    id: surface
    attributes:
      label: Surface
      description: README, dashboard, JSON, Typst/PDF output, or template.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, PDF reader, operating system, assistive technology, or other setup.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What would make this accessible?
